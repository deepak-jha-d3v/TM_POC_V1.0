<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AML Transaction Monitoring — L1 Case Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<style>
  :root{
    --ink:#0f1524; --ink-soft:#37415a;
    --paper:#eef1f7; --panel:#ffffff; --panel-2:#f8f9fc; --line:#e2e5ee; --line-strong:#c9cedb;
    --muted:#6b7280;
    --navy:#141c33; --navy2:#1f2b4d; --navy3:#2d3e6b;
    --accent:#4f6bff; --accent-bg:#eef1ff; --accent-soft:#dde3ff;
    --teal:#0b8f70; --teal-bg:#e2f6ef;
    --amber:#a3620a; --amber-bg:#fdf1de;
    --red:#c22e3d; --red-bg:#fdecee;
    --purple:#7c3aed; --purple-bg:#f1e9ff;
    --crypto:#c2760a; --crypto-bg:#fdf1de;
    --mono:'JetBrains Mono', 'SF Mono', Consolas, Menlo, monospace;
    --sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --shadow-sm: 0 1px 2px rgba(15,21,36,.06);
    --shadow-md: 0 4px 14px rgba(15,21,36,.08);
    --shadow-lg: 0 12px 32px rgba(15,21,36,.14);
    --radius: 12px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}

  header{
    background:linear-gradient(120deg,var(--navy) 0%,var(--navy2) 55%,#26365e 100%);
    color:#f4f6fb;padding:18px 30px;display:flex;align-items:center;justify-content:space-between;
    box-shadow:var(--shadow-md); position:relative; z-index:5;
  }
  header .brand{display:flex;align-items:center;gap:12px;}
  header .logo{
    width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#8ea1ff);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;
    box-shadow:0 2px 8px rgba(79,107,255,.5);
  }
  header h1{font-size:16px;font-weight:700;margin:0;letter-spacing:.1px;}
  header .tag{font-size:11.5px;color:#a9b3cf;font-family:var(--mono);margin-top:2px;}
  .stat-strip{display:flex;gap:8px;align-items:center;}
  .stat-chip{font-size:11px;font-family:var(--mono);padding:6px 11px;border-radius:20px;background:rgba(255,255,255,.08);
    color:#dbe2f5;border:1px solid rgba(255,255,255,.12);white-space:nowrap;}
  .stat-chip b{color:#fff;font-weight:700;}
  .stat-chip.high{background:rgba(194,46,61,.22);border-color:rgba(194,46,61,.35);color:#ffd9dc;}
  .stat-chip.crypto{background:rgba(194,118,10,.22);border-color:rgba(194,118,10,.35);color:#ffe6bf;}
  .audit-link{
    font-family:var(--mono);font-size:11.5px;font-weight:600;color:#dbe2f5;background:rgba(255,255,255,.08);
    padding:8px 14px;border-radius:20px;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.12);
    white-space:nowrap;cursor:default;
  }
  .audit-link-dot{width:7px;height:7px;border-radius:50%;background:#8b93ab;flex-shrink:0;}
  .audit-link.linked{color:#c9f6e6;background:rgba(11,143,112,.22);border-color:rgba(11,143,112,.35);}
  .audit-link.linked .audit-link-dot{background:#14b891;box-shadow:0 0 0 3px rgba(20,184,145,.25);}
  .audit-link.error{color:#ffd9dc;background:rgba(194,46,61,.22);border-color:rgba(194,46,61,.35);}
  .audit-link.error .audit-link-dot{background:#e0505f;}

  .layout{display:grid;grid-template-columns:380px 1fr;height:calc(100vh - 68px);}
  .queue{border-right:1px solid var(--line);overflow-y:auto;background:var(--panel);display:flex;flex-direction:column;}
  .queue-controls{padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:2;}
  .search-box{position:relative;margin-bottom:10px;}
  .search-box input{
    width:100%;padding:9px 12px 9px 32px;border:1px solid var(--line-strong);border-radius:8px;font-size:13px;
    font-family:var(--sans);background:var(--panel-2);
  }
  .search-box input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
  .search-box::before{content:'⌕';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}
  .filter-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
  .filter-btn{
    font-size:11px;font-family:var(--mono);padding:5px 10px;border-radius:16px;border:1px solid var(--line-strong);
    background:#fff;cursor:pointer;color:var(--ink-soft);transition:.12s;
  }
  .filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .risk-filter-btn{display:flex;flex-direction:column;align-items:flex-start;gap:1px;line-height:1.3;}
  .risk-filter-btn .rf-label{text-transform:capitalize;font-weight:700;}
  .risk-filter-btn .rf-range{font-size:9px;font-weight:500;color:var(--muted);}
  .risk-filter-btn.active .rf-range{color:#c7d0f5;}
  .channel-dropdown{position:relative;margin-bottom:8px;}
  .channel-toggle{width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;}
  .channel-menu{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--line-strong);
    border-radius:8px;box-shadow:var(--shadow-md);padding:8px 10px;z-index:10;}
  .channel-menu-item{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:5px 2px;cursor:pointer;color:var(--ink-soft);}
  .channel-menu-item input{margin:0;}
  .rule-chip-filters{display:flex;gap:5px;flex-wrap:wrap;max-height:96px;overflow-y:auto;padding-right:2px;}
  .rule-chip-filters::-webkit-scrollbar{width:5px;}
  .rule-chip-filters::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:4px;}
  .rule-chip{
    font-size:10px;font-family:var(--mono);padding:4px 8px;border-radius:5px;border:1px solid var(--line-strong);
    background:#fff;cursor:pointer;color:var(--muted);transition:.12s;
  }
  .rule-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .queue-head{padding:10px 16px 6px;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;}
  .qlist{flex:1;overflow-y:auto;}
  .qitem{padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;position:relative;}
  .qitem:hover{background:var(--panel-2);}
  .qitem.active{background:var(--accent-bg);}
  .qitem.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);}
  .qitem.decided{opacity:.48;}
  .qitem-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .qitem-id{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .qitem-name{font-size:14px;font-weight:700;margin-top:3px;color:var(--ink);}
  .qitem-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
  .mini-badge{font-size:9.5px;font-family:var(--mono);padding:2px 6px;border-radius:4px;background:var(--panel-2);color:var(--muted);border:1px solid var(--line);}
  .mini-badge.crypto{background:var(--crypto-bg);color:var(--crypto);border-color:#f1d6a3;}
  .qitem-rules{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;}
  .score-pill{font-family:var(--mono);font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:20px;}
  .lvl-High{background:var(--red-bg);color:var(--red);}
  .lvl-Medium-High{background:var(--amber-bg);color:var(--amber);}
  .lvl-Medium{background:var(--amber-bg);color:var(--amber);}
  .lvl-Low{background:var(--teal-bg);color:var(--teal);}

  main{overflow-y:auto;padding:26px 34px 60px;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;margin-bottom:16px;box-shadow:var(--shadow-sm);}
  .panel h2{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 14px;font-weight:700;}
  .cust-row{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
  .cust-name{font-size:21px;font-weight:800;letter-spacing:-.2px;}
  .cust-meta{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:5px;}
  .cust-flags{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .risk-chip{font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:6px;border:1px solid var(--line);text-transform:uppercase;font-weight:700;}
  .risk-low{color:var(--teal);border-color:#bfe6d7;background:var(--teal-bg);}
  .risk-medium{color:var(--amber);border-color:#f1d9ac;background:var(--amber-bg);}
  .risk-high{color:var(--red);border-color:#f0c1c7;background:var(--red-bg);}
  .crypto-chip{font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:6px;border:1px solid #f1d6a3;background:var(--crypto-bg);color:var(--crypto);font-weight:700;}

  .ai-panel{border:1px solid #bfe0d3;background:linear-gradient(165deg,#f2fbf8 0%,#ffffff 55%);}
  .ai-head{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
  .ai-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px var(--teal-bg);}
  .ai-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);font-weight:800;}
  .score-row{display:flex;align-items:center;gap:26px;margin-bottom:18px;flex-wrap:wrap;}
  .score-num{font-family:var(--mono);font-size:44px;font-weight:800;line-height:1;color:var(--ink);}
  .score-sub{font-size:12px;color:var(--muted);margin-top:5px;font-weight:600;}
  .meter{flex:1;min-width:180px;height:9px;background:#e3ede9;border-radius:5px;overflow:hidden;position:relative;}
  .meter-fill{height:100%;background:linear-gradient(90deg,#0b8f70,#14b891);border-radius:5px;transition:width .4s;}
  .meter-base{position:absolute;top:-3px;width:2px;height:15px;background:var(--ink);opacity:.35;}
  .adj-note{font-size:12.5px;color:var(--ink-soft);margin-top:8px;line-height:1.55;}
  .summary-text{font-size:14.5px;line-height:1.65;margin:16px 0 4px;color:var(--ink);}
  .action-suggest{
    display:inline-flex;align-items:center;gap:6px;margin-top:16px;font-size:12px;padding:8px 14px;border-radius:7px;
    background:var(--navy);color:#fff;font-family:var(--mono);font-weight:600;
  }

  /* Accordion */
  .accordion{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .acc-item{border:1px solid var(--line);border-radius:10px;background:#fbfbfd;overflow:hidden;transition:box-shadow .15s;}
  .acc-item.open{box-shadow:var(--shadow-sm);border-color:var(--line-strong);}
  .acc-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;gap:10px;}
  .acc-header:hover{background:#f4f5f9;}
  .acc-header-left{display:flex;align-items:center;gap:10px;min-width:0;}
  .acc-chevron{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
  .acc-item.open .acc-chevron{transform:rotate(90deg);}
  .acc-rule-id{font-family:var(--mono);font-size:10.5px;color:var(--navy3);font-weight:700;background:var(--accent-bg);padding:2px 7px;border-radius:4px;flex-shrink:0;}
  .acc-rule-name{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .acc-weight{font-family:var(--mono);font-size:10.5px;color:var(--muted);flex-shrink:0;}
  .acc-body{max-height:0;overflow:hidden;transition:max-height .25s ease;}
  .acc-item.open .acc-body{max-height:900px;}
  .acc-body-inner{padding:0 16px 16px;border-top:1px solid var(--line);padding-top:12px;}
  .acc-plain{font-size:13.5px;line-height:1.6;color:var(--ink);margin-bottom:10px;}
  .acc-evidence{font-family:var(--mono);font-size:12px;color:var(--ink-soft);background:var(--panel-2);border:1px solid var(--line);
    border-radius:6px;padding:9px 11px;line-height:1.55;}

  .txn-table{width:100%;border-collapse:collapse;margin-top:16px;font-size:12px;}
  .txn-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    padding:6px 8px;border-bottom:2px solid var(--line);font-weight:700;}
  .txn-table td{padding:7px 8px;border-bottom:1px solid var(--line);font-family:var(--mono);color:var(--ink-soft);}
  .txn-table tr:hover td{background:var(--panel-2);}
  .dir-credit{color:var(--teal);font-weight:700;}
  .dir-debit{color:var(--red);font-weight:700;}
  .asset-crypto{color:var(--crypto);font-weight:700;}
  .wallet-private{background:var(--purple-bg);color:var(--purple);padding:1px 6px;border-radius:4px;font-size:10.5px;}

  .decision-row{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;}
  .btn{flex:1;min-width:150px;padding:12px 10px;border-radius:8px;border:1px solid var(--line-strong);background:#fff;cursor:pointer;
    font-size:13px;font-weight:700;transition:.12s;font-family:var(--sans);}
  .btn:hover{border-color:var(--navy3);transform:translateY(-1px);}
  .btn.close{color:var(--teal);}
  .btn.escalate{color:var(--red);}
  .btn.info{color:var(--amber);}
  .btn.active-choice{color:#fff;border-color:transparent;}
  .btn.close.active-choice{background:var(--teal);}
  .btn.escalate.active-choice{background:var(--red);}
  .btn.info.active-choice{background:var(--amber);}
  .log-empty{font-size:13px;color:var(--muted);}
  .log-entry{font-size:12px;font-family:var(--mono);padding:9px 0;border-bottom:1px solid var(--line);color:var(--muted);}
  .log-entry b{color:var(--ink);}
  .empty-state{display:flex;align-items:center;justify-content:center;height:60vh;color:var(--muted);font-size:14px;}

  /* ============================================================ */
  /* Investigation workspace — extension for the L1 alert details  */
  /* page. Reuses the existing token system (colors/type/shadows)  */
  /* defined above rather than introducing a new visual language.  */
  /* ============================================================ */

  .sev-badge{font-size:11px;font-family:var(--mono);font-weight:800;padding:4px 11px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em;}
  .sev-Critical{background:var(--red-bg);color:var(--red);border:1px solid #f0c1c7;}
  .sev-High{background:var(--amber-bg);color:var(--amber);border:1px solid #f1d9ac;}
  .sev-Medium{background:#fff8e1;color:#9a7b1a;border:1px solid #ecdca0;}
  .sev-Low{background:var(--teal-bg);color:var(--teal);border:1px solid #bfe6d7;}

  .workflow-panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 22px;margin-bottom:16px;box-shadow:var(--shadow-sm);}
  .workflow-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:14px;}
  .workflow-steps{display:flex;gap:0;overflow-x:auto;}
  .wf-step{flex:1;min-width:150px;padding:0 14px 0 0;position:relative;}
  .wf-step:not(:last-child)::after{content:'';position:absolute;top:13px;right:0;width:14px;height:2px;background:var(--line-strong);}
  .wf-dot{width:26px;height:26px;border-radius:50%;background:var(--panel-2);border:2px solid var(--line-strong);display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:11px;font-weight:800;color:var(--muted);margin-bottom:8px;}
  .wf-step.done .wf-dot{background:var(--teal);border-color:var(--teal);color:#fff;}
  .wf-step.active .wf-dot{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 4px var(--accent-bg);}
  .wf-label{font-size:11.5px;font-weight:700;color:var(--ink);line-height:1.35;}
  .wf-sub{font-size:10.5px;color:var(--muted);margin-top:2px;}

  #invAccordion .accordion-item{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius) !important;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm);}
  #invAccordion .accordion-button{font-family:var(--sans);font-size:13.5px;font-weight:700;color:var(--ink);background:var(--panel);padding:15px 22px;box-shadow:none !important;}
  #invAccordion .accordion-button:not(.collapsed){background:var(--panel-2);color:var(--navy2);}
  #invAccordion .accordion-button::after{filter:none;}
  #invAccordion .accordion-body{padding:20px 22px 24px;border-top:1px solid var(--line);}
  #invAccordion .accordion-header .sec-flag{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:12px;margin-left:10px;}
  #invAccordion .sec-flag.flag-y{background:var(--red-bg);color:var(--red);}
  #invAccordion .sec-flag.flag-n{background:var(--teal-bg);color:var(--teal);}
  #invAccordion .sec-flag.flag-neutral{background:var(--accent-bg);color:var(--navy3);}
  .sec-icon{margin-right:9px;opacity:.7;}

  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
  .kpi-card{background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:12px 14px;}
  .kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:6px;}
  .kpi-value{font-size:16.5px;font-weight:800;color:var(--ink);font-family:var(--mono);line-height:1.25;}
  .kpi-value.small{font-size:13px;font-weight:700;font-family:var(--sans);}

  .def-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px 22px;}
  .def-item dt{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:3px;}
  .def-item dd{font-size:13.5px;color:var(--ink);margin:0;font-weight:600;}
  .subhead{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--navy3);font-weight:800;margin:20px 0 12px;padding-top:14px;border-top:1px solid var(--line);}
  .subhead:first-child{margin-top:0;padding-top:0;border-top:none;}

  .status-pill{font-size:10.5px;font-family:var(--mono);font-weight:700;padding:2px 9px;border-radius:10px;}
  .status-verified, .status-approved, .status-yes-y{background:var(--teal-bg);color:var(--teal);}
  .status-expired, .status-pending, .status-not-provided{background:var(--amber-bg);color:var(--amber);}
  .status-flagged{background:var(--red-bg);color:var(--red);}

  .inv-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px;}
  .inv-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:7px 9px;border-bottom:2px solid var(--line);font-weight:700;background:var(--panel-2);}
  .inv-table td{padding:8px 9px;border-bottom:1px solid var(--line);color:var(--ink-soft);}
  .inv-table tr:hover td{background:var(--panel-2);}
  .table-scroll{max-height:340px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;}
  .table-scroll .inv-table th{position:sticky;top:0;z-index:1;}
  .txn-filter-row th{padding:5px 6px;background:var(--panel-2);position:sticky;top:26px;z-index:1;}
  .txn-filter-row input, .txn-filter-row select{width:100%;font-size:11px;font-family:var(--sans);padding:5px 6px;
    border:1px solid var(--line-strong);border-radius:5px;background:#fff;color:var(--ink);box-sizing:border-box;}
  .txn-filter-row input:focus, .txn-filter-row select:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}

  .txn-slider-wrap{margin:12px 0 4px;padding:14px 16px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;}
  .txn-slider{width:100%;accent-color:var(--accent);}
  .txn-slider-ticks{display:flex;justify-content:space-between;margin-top:6px;font-size:10.5px;font-family:var(--mono);color:var(--muted);}
  .txn-slider-ticks .txn-tick{flex:1;text-align:center;}
  .txn-slider-ticks .txn-tick:first-child{text-align:left;}
  .txn-slider-ticks .txn-tick:last-child{text-align:right;}
  .txn-slider-ticks .txn-tick.active{color:var(--accent);font-weight:700;}
  .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px;}
  .chart-box{background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:14px 16px;}
  .chart-box h4{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin:0 0 10px;}
  .chart-canvas-wrap{position:relative;height:210px;}
  .chart-detail{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:12px;padding-top:10px;border-top:1px dashed var(--line-strong);}
  .chart-detail-item{font-size:11px;font-family:var(--mono);color:var(--ink-soft);}
  .chart-detail-item b{color:var(--ink);font-weight:700;}
  @media (max-width:900px){.chart-grid{grid-template-columns:1fr;}}

  .compare-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
  .compare-card{background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:13px 15px;}
  .compare-card .cc-label{font-size:10.5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px;}
  .compare-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
  .compare-row .exp{color:var(--muted);}
  .compare-row .act{font-weight:800;font-family:var(--mono);}
  .compare-row .act.dev{color:var(--red);}
  .deviation-list{margin-top:14px;list-style:none;padding:0;}
  .deviation-list li{font-size:13px;padding:9px 12px;background:var(--red-bg);color:var(--red);border-radius:7px;margin-bottom:7px;font-weight:600;}
  .deviation-list li::before{content:'⚠ ';}

  .flag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
  .flag-card{display:flex;gap:12px;padding:12px 14px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;align-items:flex-start;}
  .flag-light{width:13px;height:13px;border-radius:50%;flex-shrink:0;margin-top:3px;box-shadow:0 0 0 3px rgba(0,0,0,.03);}
  .flag-light.on{background:var(--red);box-shadow:0 0 0 4px var(--red-bg);}
  .flag-light.off{background:var(--teal);box-shadow:0 0 0 4px var(--teal-bg);}
  .flag-name{font-size:13px;font-weight:700;color:var(--ink);}
  .flag-reason{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.45;}
  .flag-weight{font-size:10px;font-family:var(--mono);color:var(--muted);margin-top:4px;}

  .osint-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .osint-card{background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:14px 15px;}
  .osint-head{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:8px;}
  .osint-headline{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.4;margin-bottom:8px;}
  .osint-summary{font-size:12.5px;color:var(--ink-soft);line-height:1.55;margin-bottom:10px;}
  .osint-tags{display:flex;gap:6px;flex-wrap:wrap;}
  .osint-tag{font-size:10px;font-family:var(--mono);font-weight:700;padding:3px 8px;border-radius:5px;background:var(--red-bg);color:var(--red);}
  .osint-tag.sentiment-Positive{background:var(--teal-bg);color:var(--teal);}
  .osint-tag.sentiment-Neutral{background:var(--accent-bg);color:var(--navy3);}

  .ubo-tree{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px;}
  .ubo-root{background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-weight:800;font-size:13.5px;}
  .ubo-connector{width:2px;height:16px;background:var(--line-strong);}
  .ubo-branches{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
  .ubo-node{background:var(--panel-2);border:1px solid var(--line-strong);border-radius:8px;padding:9px 13px;min-width:150px;text-align:center;}
  .ubo-node .ubo-name{font-size:12.5px;font-weight:700;color:var(--ink);}
  .ubo-node .ubo-pct{font-family:var(--mono);font-weight:800;color:var(--accent);font-size:14px;margin:3px 0;}
  .ubo-node .ubo-flags{display:flex;gap:4px;justify-content:center;margin-top:4px;}

  .rec-banner{display:flex;align-items:center;gap:16px;padding:16px 20px;border-radius:10px;margin-bottom:16px;}
  .rec-banner.rec-Close{background:var(--teal-bg);border:1px solid #bfe6d7;}
  .rec-banner.rec-Escalate{background:var(--amber-bg);border:1px solid #f1d9ac;}
  .rec-banner.rec-Need{background:var(--accent-bg);border:1px solid var(--accent-soft);}
  .rec-banner.rec-Potential{background:var(--red-bg);border:1px solid #f0c1c7;}
  .rec-icon{font-size:26px;}
  .rec-decision{font-size:17px;font-weight:800;color:var(--ink);}
  .rec-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .rec-reasons{list-style:none;padding:0;margin:0;}
  .rec-reasons li{font-size:13px;line-height:1.6;padding:7px 0;border-bottom:1px solid var(--line);color:var(--ink-soft);}
  .rec-reasons li:last-child{border-bottom:none;}
  .rec-reasons li::before{content:'▸ ';color:var(--accent);font-weight:800;}

  .notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .notes-field label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;display:block;margin-bottom:6px;}
  .notes-field select{width:100%;border:1px solid var(--line-strong);border-radius:8px;padding:9px 12px;
    font-family:var(--sans);font-size:13px;background:var(--panel-2);}
  .notes-field select:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);background:#fff;}
  @media (max-width:900px){.notes-grid{grid-template-columns:1fr;}}
  select.decision-rationale{width:100%;margin-top:12px;border:1px solid var(--line-strong);border-radius:8px;padding:10px 12px;
    font-family:var(--sans);font-size:13px;background:var(--panel-2);}
  select.decision-rationale:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);background:#fff;}

  .timeline{position:relative;padding-left:26px;}
  .timeline::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line-strong);}
  .tl-item{position:relative;padding-bottom:18px;}
  .tl-item:last-child{padding-bottom:0;}
  .tl-dot{position:absolute;left:-26px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--panel);box-shadow:0 0 0 2px var(--accent);}
  .tl-time{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .tl-action{font-size:13.5px;font-weight:700;color:var(--ink);margin-top:2px;}
  .tl-meta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .tl-user{font-weight:600;color:var(--navy3);}

  .sla-row{display:flex;align-items:center;gap:26px;flex-wrap:wrap;}
  .sla-stat{min-width:110px;}
  .sla-stat .sv{font-family:var(--mono);font-size:22px;font-weight:800;color:var(--ink);}
  .sla-stat .sl{font-size:10.5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:2px;}
  .sla-bar-wrap{flex:1;min-width:220px;}
  .sla-bar{height:11px;border-radius:6px;background:#e3e6ee;overflow:hidden;}
  .sla-bar-fill{height:100%;border-radius:6px;transition:width .4s;}
  .sla-fill-ok{background:linear-gradient(90deg,#0b8f70,#14b891);}
  .sla-fill-warn{background:linear-gradient(90deg,#c98a1d,#e0a83f);}
  .sla-fill-bad{background:linear-gradient(90deg,#c22e3d,#e0505f);}
  .sla-status-pill{font-family:var(--mono);font-size:11px;font-weight:800;padding:5px 12px;border-radius:20px;}
  .sla-Within-SLA{background:var(--teal-bg);color:var(--teal);}
  .sla-Near-Breach{background:var(--amber-bg);color:var(--amber);}
  .sla-Breached{background:var(--red-bg);color:var(--red);}

  .disp-btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
  .rationale-note{font-size:12px;color:var(--muted);margin-top:8px;}

  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
  .narrative-box{width:100%;margin-top:8px;border:1px solid var(--line-strong);border-radius:8px;padding:10px 12px;
    font-family:var(--sans);font-size:13px;background:var(--panel-2);min-height:84px;resize:vertical;}
  .narrative-box:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);background:#fff;}
  .narrative-box:disabled{background:var(--panel-2);color:var(--ink-soft);}
  .field-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;display:block;margin-top:14px;margin-bottom:6px;}
  .submit-btn{margin-top:2px;background:var(--navy);color:#fff;border-color:var(--navy);}
  .submit-btn:disabled{background:#c7cbd8;border-color:#c7cbd8;color:#fff;opacity:1;}
  .decision-locked-banner{font-size:12.5px;background:var(--teal-bg);color:var(--teal);border:1px solid #bfe6d7;
    border-radius:8px;padding:9px 13px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .decision-amend-banner{font-size:12.5px;background:var(--amber-bg);color:var(--amber);border:1px solid #f1d9ac;
    border-radius:8px;padding:9px 13px;margin-bottom:12px;}
  .amend-link{font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--teal);background:#fff;
    border:1px solid #bfe6d7;border-radius:14px;padding:3px 11px;cursor:pointer;}
  .amend-link:hover{background:var(--teal-bg);}
  .prior-decisions{margin-top:6px;}
  .print-btn{font-family:var(--mono);font-size:11.5px;font-weight:600;color:#dbe2f5;background:rgba(255,255,255,.08);
    padding:8px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.12);cursor:pointer;white-space:nowrap;}
  .print-btn:hover{background:rgba(255,255,255,.16);}

  @media print{
    .queue, .print-btn, .audit-link, header .stat-strip, .decision-row, .submit-btn, .amend-link,
    #analystFeedbackPanel select, #analystFeedbackPanel textarea, #analystFeedbackPanel .field-label{ display:none !important; }
    .layout{ display:block; height:auto; }
    main{ overflow:visible; padding:8px 4px; }
    .accordion-collapse{ display:block !important; height:auto !important; }
    .panel, .workflow-panel{ box-shadow:none; break-inside:avoid; }
    body{ background:#fff; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">TM</div>
    <div>
      <h1>AML Transaction Monitoring — L1 Case Review</h1>
      <div class="tag">POC · synthetic data incl. crypto &amp; private wallets · human-in-the-loop</div>
    </div>
  </div>
  <div class="stat-strip" id="statStrip"></div>
  <button class="print-btn" onclick="printCasePacket()" title="Print or save the full case file as a PDF — for SAR referral or escalation packets">🖨️ Print case packet</button>
  <div class="audit-link" id="auditLinkStatus" title="Every submitted decision is written straight to this file — no manual export needed">
    <span class="audit-link-dot" id="auditLinkDot"></span>
    <span id="auditLinkText">Audit log not yet linked</span>
  </div>
</header>

<div class="layout">
  <div class="queue">
    <div class="queue-controls">
      <div class="search-box"><input id="searchBox" placeholder="Search customer or ID…" oninput="renderQueue()"></div>
      <div class="filter-row" id="riskFilterRow"></div>
      <div class="channel-dropdown" id="channelDropdownWrap"></div>
      <div class="rule-chip-filters" id="ruleChipFilters"></div>
    </div>
    <div class="queue-head" id="queueHeadLabel">Alert queue</div>
    <div class="qlist" id="queueList"></div>
  </div>
  <main id="mainPanel"></main>
</div>

<script>
const ALERTS = __ALERTS_JSON__;
const RULE_CATALOG = __RULE_CATALOG_JSON__;
const INV_DATA = __INVESTIGATION_JSON__; // customer_id -> full investigation workspace bundle

const decisions = {}; // alert_id -> {action, note, narrative, override, amended, history[], timestamp} -- only set once SUBMITTED
const notesState = {}; // alert_id -> {summary, observations, evidence, decision, recommendation, comments}
let selectedId = ALERTS.length ? ALERTS[0].alert_id : null;
let searchTerm = '';
let riskFilter = 'all';
let activeRuleFilters = new Set();
const CHANNELS = ['cash','card','ach','wire','crypto'];
let activeChannelFilters = new Set();
let channelMenuOpen = false;
const RISK_SCORE_RANGES = {low:'score 0–49', medium:'score 50–69', high:'score 70–100'};
let openAccordions = new Set(); // rule_ids open for current alert
const chartInstances = {}; // canvas id -> Chart instance, torn down before re-render

// Staging state for the current alert's disposition -- a click on Close / Request Info /
// Escalate only stages a choice; nothing is committed (or written to the audit file) until
// Submit Decision is clicked. Reset whenever the analyst switches alerts.
let stagedAction = null;
let draftNote = '';
let draftNarrative = '';

const DECISIONS_STORAGE_KEY = 'l1_tm_poc_decisions_v1';
function loadDecisionsFromStorage(){
  try{
    const raw = localStorage.getItem(DECISIONS_STORAGE_KEY);
    if(raw) Object.assign(decisions, JSON.parse(raw));
  } catch(err){
    console.error('Failed to load previously submitted decisions from localStorage:', err);
  }
}
function saveDecisionsToStorage(){
  try{
    localStorage.setItem(DECISIONS_STORAGE_KEY, JSON.stringify(decisions));
  } catch(err){
    console.error('Failed to save decisions to localStorage:', err);
  }
}

function getNotes(alertId){
  if(!notesState[alertId]) notesState[alertId] = {summary:'',observations:'',evidence:'',decision:'',recommendation:''};
  return notesState[alertId];
}
function updateNote(alertId, field, value){
  getNotes(alertId)[field] = value;
}

const PRIORITY_MAP = (score)=> score>=85 ? 'Critical' : score>=70 ? 'High' : score>=50 ? 'Medium' : 'Low';
const DECISION_LABELS = {close_false_positive:'Closed — False Positive', escalate_to_l2:'Escalated to L2', request_more_info:'Pending — More Info Requested'};
const REC_CLASS_MAP = {'Close Alert':'rec-Close','Escalate to L2':'rec-Escalate','Need More Information':'rec-Need','Potential SAR':'rec-Potential'};
const REC_ICON_MAP = {'Close Alert':'✅','Escalate to L2':'⤴️','Need More Information':'❔','Potential SAR':'🚨'};

function slug(label){ return label.replace(/\s+/g,'-'); }
function fmtMoney(n){ return '$' + Number(n).toLocaleString(undefined,{maximumFractionDigits:0}); }

function isCryptoAlert(a){
  return (a.crypto_transaction_count && a.crypto_transaction_count > 0) ||
         a.rules_triggered.some(r => ['R04_LOW_BUYER_DIVERSITY','R07_PRIVATE_WALLET_WITHDRAWAL','R10_FREQUENT_CONVERSIONS'].includes(r.rule_id));
}

function renderStatStrip(){
  const total = ALERTS.length;
  const high = ALERTS.filter(a=>a.ai_copilot.confidence_label==='High').length;
  const crypto = ALERTS.filter(isCryptoAlert).length;
  const rulesFired = new Set();
  ALERTS.forEach(a=>a.rules_triggered.forEach(r=>rulesFired.add(r.rule_id)));
  document.getElementById('statStrip').innerHTML = `
    <span class="stat-chip"><b>${total}</b> alerts</span>
    <span class="stat-chip high"><b>${high}</b> high</span>
    <span class="stat-chip crypto"><b>${crypto}</b> crypto-involved</span>
    <span class="stat-chip"><b>${rulesFired.size}</b>/${RULE_CATALOG.length} rules firing</span>
  `;
}

function renderFilterControls(){
  const risks = ['all','low','medium','high'];
  document.getElementById('riskFilterRow').innerHTML = risks.map(r=>
    `<button class="filter-btn risk-filter-btn ${riskFilter===r?'active':''}" onclick="setRiskFilter('${r}')">
      <span class="rf-label">${r==='all'?'All risk':r}</span>
      ${r!=='all' ? `<span class="rf-range">${RISK_SCORE_RANGES[r]}</span>` : ''}
    </button>`
  ).join('');

  document.getElementById('ruleChipFilters').innerHTML = RULE_CATALOG.map(r=>
    `<button class="rule-chip ${activeRuleFilters.has(r.rule_id)?'active':''}" onclick="toggleRuleFilter('${r.rule_id}')" title="${r.name} — ${r.description||''}">${r.rule_id.split('_')[0]}</button>`
  ).join('');

  renderChannelDropdown();
}

function renderChannelDropdown(){
  const wrap = document.getElementById('channelDropdownWrap');
  const countLabel = activeChannelFilters.size ? ` (${activeChannelFilters.size})` : '';
  wrap.innerHTML = `
    <button class="filter-btn channel-toggle" onclick="toggleChannelMenu()">🔀 Transaction channel${countLabel} <span>${channelMenuOpen?'▲':'▼'}</span></button>
    ${channelMenuOpen ? `<div class="channel-menu">${CHANNELS.map(c=>
      `<label class="channel-menu-item"><input type="checkbox" ${activeChannelFilters.has(c)?'checked':''} onchange="toggleChannelFilter('${c}')"> ${c}</label>`
    ).join('')}</div>` : ''}
  `;
}

function toggleChannelMenu(){ channelMenuOpen = !channelMenuOpen; renderChannelDropdown(); }
function toggleChannelFilter(ch){
  if(activeChannelFilters.has(ch)) activeChannelFilters.delete(ch); else activeChannelFilters.add(ch);
  renderChannelDropdown(); renderQueue();
}

function setRiskFilter(r){ riskFilter = r; renderFilterControls(); renderQueue(); }
function toggleRuleFilter(ruleId){
  if(activeRuleFilters.has(ruleId)) activeRuleFilters.delete(ruleId); else activeRuleFilters.add(ruleId);
  renderFilterControls(); renderQueue();
}

function alertChannels(a){
  const inv = INV_DATA[a.customer_id];
  if(!inv) return new Set();
  return new Set(Object.keys(inv.transaction_analysis.channel_distribution||{}));
}

function filteredAlerts(){
  const term = document.getElementById('searchBox') ? document.getElementById('searchBox').value.trim().toLowerCase() : '';
  return ALERTS.filter(a=>{
    if(term && !(a.customer_name.toLowerCase().includes(term) || a.customer_id.toLowerCase().includes(term) || a.alert_id.toLowerCase().includes(term))) return false;
    if(riskFilter!=='all' && a.customer_risk_rating!==riskFilter) return false;
    if(activeRuleFilters.size>0 && !a.rules_triggered.some(r=>activeRuleFilters.has(r.rule_id))) return false;
    if(activeChannelFilters.size>0){
      const chans = alertChannels(a);
      if(![...activeChannelFilters].some(c=>chans.has(c))) return false;
    }
    return true;
  });
}

function renderQueue(){
  const list = document.getElementById('queueList');
  const filtered = [...filteredAlerts()].sort((a,b)=>b.ai_copilot.confidence_score - a.ai_copilot.confidence_score);
  document.getElementById('queueHeadLabel').textContent = `${filtered.length} of ${ALERTS.length} alerts · sorted by AI confidence`;

  if(filtered.length===0){
    list.innerHTML = `<div style="padding:24px 16px;color:var(--muted);font-size:13px;">No alerts match the current filters.</div>`;
    return;
  }

  list.innerHTML = filtered.map(a=>{
    const ai = a.ai_copilot;
    const decided = decisions[a.alert_id];
    const ruleTags = a.rules_triggered.map(r=>r.rule_id.split('_')[0]).join(' · ');
    const crypto = isCryptoAlert(a);
    return `<div class="qitem ${a.alert_id===selectedId?'active':''} ${decided?'decided':''}" onclick="selectAlert('${a.alert_id}')">
      <div class="qitem-top">
        <span class="qitem-id">${a.alert_id}</span>
        <span class="score-pill lvl-${slug(ai.confidence_label)}">${ai.confidence_score}</span>
      </div>
      <div class="qitem-name">${a.customer_name}</div>
      <div class="qitem-badges">
        <span class="mini-badge">${a.customer_risk_rating} risk</span>
        <span class="mini-badge">${a.customer_country}</span>
        ${crypto ? `<span class="mini-badge crypto">🪙 crypto</span>` : ''}
        ${decided ? `<span class="mini-badge">${decided.action.replace(/_/g,' ')}</span>` : ''}
      </div>
      <div class="qitem-rules">${ruleTags}</div>
    </div>`;
  }).join('');

  if(!filtered.find(a=>a.alert_id===selectedId) && filtered.length>0){
    selectedId = filtered[0].alert_id;
  }
}

function selectAlert(id){
  selectedId = id;
  openAccordions = new Set();
  stagedAction = null;
  draftNote = '';
  draftNarrative = '';
  renderQueue();
  renderMain();
}

function toggleAccordion(ruleId){
  if(openAccordions.has(ruleId)) openAccordions.delete(ruleId); else openAccordions.add(ruleId);
  renderMain(true);
}

function txnRow(t){
  const dirClass = t.direction==='credit' ? 'dir-credit' : 'dir-debit';
  const assetClass = t.asset_type==='CRYPTO' ? 'asset-crypto' : '';
  const walletBadge = t.wallet_type==='private_wallet' ? `<span class="wallet-private">private wallet</span>` :
                       (t.wallet_type==='exchange_wallet' ? 'exchange' : '—');
  const amountLabel = t.asset_type==='CRYPTO' ? `${t.currency} ${fmtMoney(t.amount)}` : fmtMoney(t.amount);
  return `<tr>
    <td>${t.timestamp}</td>
    <td class="${dirClass}">${t.direction}</td>
    <td class="${assetClass}">${amountLabel}</td>
    <td>${t.channel}</td>
    <td>${walletBadge}</td>
    <td>${t.counterparty} (${t.counterparty_country})</td>
  </tr>`;
}

/* ================================================================ */
/* Investigation workspace section builders                          */
/* Each function returns an HTML string for one collapsible section  */
/* of the L1 investigation page. All data comes from INV_DATA, keyed */
/* by customer_id, so it is consistent with the alert/queue data.    */
/* ================================================================ */

function accItem(sectionId, icon, title, flagHtml, bodyHtml, open){
  return `<div class="accordion-item">
    <h2 class="accordion-header" id="heading-${sectionId}">
      <button class="accordion-button ${open?'':'collapsed'}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-${sectionId}" aria-expanded="${open?'true':'false'}" aria-controls="collapse-${sectionId}">
        <span class="sec-icon">${icon}</span>${title}${flagHtml||''}
      </button>
    </h2>
    <div id="collapse-${sectionId}" class="accordion-collapse collapse ${open?'show':''}" aria-labelledby="heading-${sectionId}">
      <div class="accordion-body">${bodyHtml}</div>
    </div>
  </div>`;
}
function flagPill(isY, label){
  return `<span class="sec-flag ${isY?'flag-y':'flag-n'}">${label||(isY?'Y':'N')}</span>`;
}
function statusPillClass(status){
  const s = (status||'').toLowerCase();

function toBullets(text){
  if(!text) return [];
  // Split on sentence boundaries (". " followed by a capital letter) and on " -- " sub-clauses
  // so the AI's score-adjustment reasoning reads as scannable bullets instead of one dense paragraph.
  return text
    .split(/\.\s+(?=[A-Z])/)
    .map(s=>s.trim())
    .filter(Boolean)
    .map(s=> s.endsWith('.') ? s : s + '.');
}

function monthLabel(ym){
  const [y,m] = ym.split('-');
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${names[parseInt(m,10)-1]} ${y}`;
}

/* Transaction-history granularity slider: Yearly -> Half-Yearly -> Quarterly -> Monthly -> Daily.
   Aggregates the raw (daily) transaction history client-side, since that is the
   finest-grained data available -- every coarser bucket is derived from it. */
const PERIOD_STEPS = ['yearly','half-yearly','quarterly','monthly','daily'];
const PERIOD_LABELS = {yearly:'Yearly', 'half-yearly':'Half-Yearly', quarterly:'Quarterly', monthly:'Monthly', daily:'Daily'};
let txnPeriod = 'yearly';

function periodBucketKey(dateStr, period){
  const d = new Date(dateStr + 'T00:00:00Z');
  const y = d.getUTCFullYear(), m = d.getUTCMonth();
  if(period==='daily') return dateStr;
  if(period==='monthly') return dateStr.slice(0,7);
  if(period==='quarterly') return `${y}-Q${Math.floor(m/3)+1}`;
  if(period==='half-yearly') return `${y}-H${m<6?1:2}`;
  return String(y);
}
function periodBucketLabel(key, period){
  return period==='monthly' ? monthLabel(key) : key;
}
function aggregateHistoryByPeriod(history, period){
  const buckets = {};
  history.forEach(t=>{
    const key = periodBucketKey(t.date, period);
    if(!buckets[key]) buckets[key] = {count:0, value:0};
    buckets[key].count += 1;
    buckets[key].value += t.amount;
  });
  const keys = Object.keys(buckets).sort();
  return {keys, labels: keys.map(k=>periodBucketLabel(k, period)),
           volume: keys.map(k=>buckets[k].count), value: keys.map(k=>buckets[k].value)};
}

function onTxnPeriodChange(idx, alertId){
  idx = Number(idx);
  txnPeriod = PERIOD_STEPS[idx];
  const ticksEl = document.getElementById(`txnTicks-${alertId}`);
  if(ticksEl) [...ticksEl.children].forEach((el,i)=>el.classList.toggle('active', i===idx));
  const sliderEl = document.getElementById(`txnSlider-${alertId}`);
  if(sliderEl) sliderEl.value = idx;
  const a = ALERTS.find(x=>x.alert_id===alertId);
  const inv = INV_DATA[a.customer_id];
  renderTrendCharts(inv, alertId);
}

function chartDetailList(pairs, formatValue){

  return `<div class="chart-detail">${pairs.map(([label,val])=>
    `<span class="chart-detail-item"><b>${label}</b>${formatValue(val)}</span>`).join('')}</div>`;
}

function historyRow(t){

const HISTORY_FILTER_COLS = ['date','amount','direction','counterparty','country','channel','purpose','risk_indicator'];
// Exact-match dropdown columns (options come verbatim from the data, e.g. "Near CTR
// threshold") must not be lowercased -- only the free-text substring-search columns should be.
const HISTORY_FILTER_EXACT_COLS = new Set(['direction','channel','risk_indicator']);

function historyFilterValues(alertId){
  const vals = {};
  HISTORY_FILTER_COLS.forEach(col=>{
    const el = document.getElementById(`txnFilter-${alertId}-${col}`);
    if(!el){ vals[col] = ''; return; }
    const raw = el.value.trim();
    vals[col] = HISTORY_FILTER_EXACT_COLS.has(col) ? raw : raw.toLowerCase();
  });
  return vals;
}

function filterHistoryTable(alertId){
  const a = ALERTS.find(x=>x.alert_id===alertId);
  const inv = INV_DATA[a.customer_id];
  const ta = inv.transaction_analysis;
  const f = historyFilterValues(alertId);
  const filtered = ta.history.filter(t=>{
    if(f.date && !t.date.toLowerCase().includes(f.date)) return false;
    if(f.amount && !String(t.amount).includes(f.amount)) return false;
    if(f.direction && t.direction!==f.direction) return false;
    if(f.counterparty && !t.counterparty.toLowerCase().includes(f.counterparty)) return false;
    if(f.country && !t.country.toLowerCase().includes(f.country)) return false;
    if(f.channel && t.channel!==f.channel) return false;
    if(f.purpose && !t.purpose.toLowerCase().includes(f.purpose)) return false;
    if(f.risk_indicator && t.risk_indicator!==f.risk_indicator) return false;
    return true;
  });
  const bodyEl = document.getElementById(`txnHistoryBody-${alertId}`);
  if(bodyEl) bodyEl.innerHTML = filtered.map(historyRow).join('') ||
    `<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:16px">No transactions match the current filters.</td></tr>`;
  const countEl = document.getElementById(`txnHistoryCount-${alertId}`);
  if(countEl) countEl.textContent = `${filtered.length} of ${ta.history.length} shown`;
}

function historyFilterSelect(alertId, col, options, label){
  return `<select id="txnFilter-${alertId}-${col}" onchange="filterHistoryTable('${alertId}')">
    <option value="">${label}</option>
    ${options.map(o=>`<option value="${o}">${o}</option>`).join('')}
  </select>`;
}
function historyFilterInput(alertId, col, placeholder){
  return `<input type="text" id="txnFilter-${alertId}-${col}" placeholder="${placeholder}" oninput="filterHistoryTable('${alertId}')">`;
}

      <div class="txn-slider-ticks" id="txnTicks-${alertId}">
        ${PERIOD_STEPS.map((p,i)=>`<span class="txn-tick ${p===txnPeriod?'active':''}">${PERIOD_LABELS[p]}</span>`).join('')}
      </div>
    </div>
    <div class="chart-grid">
      <div class="chart-box"><h4>Transaction volume</h4><div class="chart-canvas-wrap"><canvas id="chart-vol-${alertId}"></canvas></div><div id="vol-detail-${alertId}"></div></div>
      <div class="chart-box"><h4>Transaction value</h4><div class="chart-canvas-wrap"><canvas id="chart-val-${alertId}"></canvas></div><div id="val-detail-${alertId}"></div></div>

function renderTrendCharts(inv, alertId){
  const ta = inv.transaction_analysis;
  const agg = aggregateHistoryByPeriod(ta.history, txnPeriod);
  const totalTxns = ta.history.length;
  const totalValue = ta.history.reduce((s,t)=>s+t.amount,0);

  const summaryEl = document.getElementById(`txnSummary-${alertId}`);
  if(summaryEl) summaryEl.textContent = `— ${totalTxns} txns totalling ${fmtMoney(totalValue)}, shown ${PERIOD_LABELS[txnPeriod].toLowerCase()}`;

  const volDetailEl = document.getElementById(`vol-detail-${alertId}`);
  if(volDetailEl) volDetailEl.innerHTML = chartDetailList(agg.keys.map((k,i)=>[agg.labels[i], agg.volume[i]]), v=>`: ${v} txns`);
  const valDetailEl = document.getElementById(`val-detail-${alertId}`);
  if(valDetailEl) valDetailEl.innerHTML = chartDetailList(agg.keys.map((k,i)=>[agg.labels[i], agg.value[i]]), v=>`: ${fmtMoney(v)}`);

  if(typeof Chart === 'undefined') return; // Chart.js CDN unreachable — the detail lists still show the same numbers
  const destroy = id=>{ if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; } };
  const volId = `chart-vol-${alertId}`, valId = `chart-val-${alertId}`;
  [volId,valId].forEach(destroy);

  const volCtx = document.getElementById(volId);
  if(volCtx) chartInstances[volId] = new Chart(volCtx, {type:'bar', data:{labels:agg.labels, datasets:[{label:'Transactions', data:agg.volume, backgroundColor:'#4f6bff', borderRadius:4}]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:(ctx)=>`${ctx.parsed.y} transactions`}}}, scales:{y:{beginAtZero:true, title:{display:true,text:'Transactions',font:{size:10}}}}}});

  const valCtx = document.getElementById(valId);
  if(valCtx) chartInstances[valId] = new Chart(valCtx, {type:'line', data:{labels:agg.labels, datasets:[{label:'Value', data:agg.value, borderColor:'#0b8f70', backgroundColor:'rgba(11,143,112,.12)', fill:true, tension:.3, pointRadius:4, pointBackgroundColor:'#0b8f70'}]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:(ctx)=>fmtMoney(ctx.parsed.y)}}}, scales:{y:{beginAtZero:true, title:{display:true,text:'USD equivalent',font:{size:10}}, ticks:{callback:(v)=>'$'+v.toLocaleString()}}}}});
}

function renderDistributionCharts(inv, alertId){
  if(typeof Chart === 'undefined') return;
  const ta = inv.transaction_analysis;
  const destroy = id=>{ if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; } };
  const palette = ['#4f6bff','#0b8f70','#a3620a','#c22e3d','#7c3aed','#2d3e6b','#14b891','#e0a83f'];

  const ctryId = `chart-country-${alertId}`, chanId = `chart-channel-${alertId}`;
  [ctryId,chanId].forEach(destroy);

  const countries = Object.keys(ta.country_distribution);
  const countryTotal = countries.reduce((s,c)=>s+ta.country_distribution[c],0);
  const ctryCtx = document.getElementById(ctryId);
  if(ctryCtx) chartInstances[ctryId] = new Chart(ctryCtx, {type:'doughnut', data:{labels:countries, datasets:[{data:countries.map(c=>ta.country_distribution[c]), backgroundColor:palette}]},
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'right', labels:{boxWidth:11,font:{size:10}}}, tooltip:{callbacks:{label:(ctx)=>`${ctx.label}: ${ctx.parsed} (${Math.round(ctx.parsed/countryTotal*100)}%)`}}}}});

  const channels = Object.keys(ta.channel_distribution);
  const channelTotal = channels.reduce((s,c)=>s+ta.channel_distribution[c],0);

function buildAnalystFeedbackPanel(a, inv, decided){
  const rec = inv.recommendation;
  const locked = !!decided && stagedAction===null;      // submitted, not currently being amended
  const amending = !!decided && stagedAction!==null;     // submitted before, re-opened via "Amend decision"
  const activeAction = stagedAction!==null ? stagedAction : (decided ? decided.action : null);
  const currentNote = stagedAction!==null ? draftNote : (decided?.note || '');
  const currentNarrative = stagedAction!==null ? draftNarrative : (decided?.narrative || '');

  const optsHtml = DECISION_RATIONALE_OPTIONS.map(o=>`<option value="${o}" ${currentNote===o?'selected':''}>${o}</option>`).join('');

  const btn = (action, cls, label) =>
    `<button class="btn ${cls} ${activeAction===action?'active-choice':''}" ${locked?'disabled':''} onclick="stage('${action}')">${label}</button>`;

  const priorHistoryHtml = (decided && decided.history && decided.history.length) ? `
    <div class="prior-decisions">
      <div class="subhead" style="margin-top:16px">Decision history (${decided.history.length} prior submission${decided.history.length>1?'s':''})</div>
      ${decided.history.map(h=>`<div class="log-entry"><b>${h.action.replace(/_/g,' ')}</b> at ${h.timestamp}${h.note?' — "'+h.note+'"':''}</div>`).join('')}
    </div>` : '';

  return `<div class="panel" id="analystFeedbackPanel">
    <h2>L1 Analyst Feedback &amp; Disposition (human-in-the-loop)</h2>
    <p class="rationale-note" style="margin-bottom:12px">System recommendation: <b>${rec.decision}</b> · AI suggested action: <b>${a.ai_copilot.suggested_action.replace(/_/g,' ')}</b>. Record your own decision and rationale below — this is the analyst's independent judgment call, not just an acceptance of the system output.</p>

    ${locked ? `<div class="decision-locked-banner">✓ Decision submitted — <b>${decided.action.replace(/_/g,' ')}</b> at ${decided.timestamp}. <button type="button" class="amend-link" onclick="amendDecision()">Amend decision</button></div>` : ''}
    ${amending ? `<div class="decision-amend-banner">Amending the previous decision (originally <b>${decided.action.replace(/_/g,' ')}</b> at ${decided.timestamp}). Submitting will record this as an amendment and keep the prior decision in the audit trail.</div>` : ''}

    <div class="decision-row">
      ${btn('close_false_positive','close','Close — False Positive')}
      ${btn('request_more_info','info','Request More Info')}
      ${btn('escalate_to_l2','escalate','Escalate to L2 / SAR Review')}
    </div>

    <label class="field-label">Analyst Rationale</label>
    <select id="noteBox" class="decision-rationale" ${locked?'disabled':''}>
      <option value="" ${!currentNote?'selected':''} disabled>Select a rationale — mandatory when closing as false positive or overriding the AI/system recommendation</option>
      ${optsHtml}
    </select>

    <label class="field-label">Case Narrative (free text)${activeAction==='escalate_to_l2' ? ' — <span style="color:var(--red)">required for escalation</span>' : ' — <span style="color:var(--muted);text-transform:none;letter-spacing:0;font-weight:500">optional, recommended for the case file</span>'}</label>
    <textarea id="narrativeBox" class="narrative-box" ${locked?'disabled':''} placeholder="Describe the transaction pattern, evidence reviewed, and basis for this disposition in your own words.">${currentNarrative}</textarea>

    <div style="margin-top:14px">
      <button class="btn submit-btn" onclick="submitDecision()" ${stagedAction===null?'disabled':''}>${amending?'Submit amendment':'Submit decision'}</button>
    </div>

    <div id="logArea" style="margin-top:14px">${decided ? `<div class="log-entry"><b>${decided.action.replace(/_/g,' ')}</b> by L1 Analyst (demo) at ${decided.timestamp}${decided.note? ' — "'+decided.note+'"':''}${decided.override? ' <span style="color:var(--amber)">[override of system recommendation]</span>':''}${decided.amended? ' <span style="color:var(--accent)">[amended]</span>':''}${decided.narrative? '<br><span style="color:var(--ink-soft)">Narrative: '+decided.narrative+'</span>':''}</div>` : '<div class="log-empty">No decision recorded yet for this alert.</div>'}</div>
    ${priorHistoryHtml}
  </div>`;
}

    ['flags', '🚦', 'Risk Indicators (Red Flag Analysis)', flagPill(inv.red_flags.some(f=>f.triggered==='Y'), `${inv.red_flags.filter(f=>f.triggered==='Y').length} triggered`), buildRedFlags(inv), false],
    ['rec', '🧭', 'Recommended Decision (system)', `<span class="sec-flag flag-neutral">${inv.recommendation.decision}</span>`, buildRecommendation(a, inv, decided), true],

    ['audit', '🕓', 'Case Audit Trail', null, buildAuditTrail(a, inv, decided), false],
    ['sla', '⏱️', 'SLA Tracker', `<span class="sla-status-pill sla-${inv.sla.status.replace(/\s+/g,'-')}" style="margin-left:10px">${inv.sla.status}</span>`, buildSla(inv), false],
  ];

  main.innerHTML = `

const AUDIT_HEADERS = ['alert_id','customer_id','customer_name','customer_risk_rating','customer_country',
                        'rules_triggered','ai_base_score','ai_confidence_score','ai_confidence_label',
                        'ai_suggested_action','analyst_decision','analyst_note','analyst_narrative',
                        'override_of_ai','amended_decision','decision_timestamp'];
let auditFileHandle = null;                          // FileSystemFileHandle, once the analyst has linked/created L1_Audit_tracker.csv
const auditFsaSupported = 'showSaveFilePicker' in window;
const auditRowsForFallbackDownload = [];              // used only in browsers without the File System Access API

function csvEscape(v){
  if(v===undefined || v===null) return '';
  const s = String(v);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}

function auditRowFor(a, decided){
  const ai = a.ai_copilot;
  const ruleList = a.rules_triggered.map(r=>r.rule_id).join('; ');
  return [
    a.alert_id, a.customer_id, a.customer_name, a.customer_risk_rating, a.customer_country,
    ruleList, ai.base_score, ai.confidence_score, ai.confidence_label, ai.suggested_action,
    decided.action, decided.note, decided.narrative || '', decided.override, decided.amended ? 'Y' : 'N', decided.timestamp
  ].map(csvEscape).join(',');
}

function setAuditLinkStatus(text, mode){
  const el = document.getElementById('auditLinkStatus');
  const txt = document.getElementById('auditLinkText');
  if(!el || !txt) return;
  el.classList.remove('linked','error');
  if(mode) el.classList.add(mode);
  txt.textContent = text;
}

// Writes one audit row straight to a local L1_Audit_tracker.csv on the analyst's machine —
// no manual export step. The first submitted decision in a session prompts the analyst to
// pick/create the file (a required user gesture); every decision after that appends to it
// silently. Browsers without the File System Access API (Firefox, Safari) fall back to
// re-downloading the same filename with the full audit history each time.
async function persistAuditRow(a, decided){
  const row = auditRowFor(a, decided);

  if(auditFsaSupported){
    try{
      if(!auditFileHandle){
        auditFileHandle = await window.showSaveFilePicker({
          suggestedName: 'L1_Audit_tracker.csv',
          types: [{ description: 'CSV file', accept: { 'text/csv': ['.csv'] } }],
        });
      }
      const file = await auditFileHandle.getFile();
      const isNewFile = file.size === 0;
      const writable = await auditFileHandle.createWritable({ keepExistingData: true });
      const text = (isNewFile ? AUDIT_HEADERS.join(',') + '\n' : '') + row + '\n';
      await writable.write({ type: 'write', position: file.size, data: text });
      await writable.close();
      setAuditLinkStatus(`Linked — saved to ${auditFileHandle.name}`, 'linked');
    } catch(err){
      // Analyst cancelled the file picker, or a write failed — decision is still recorded
      // in-app either way; just surface that the on-disk copy didn't update this time.
      console.error('Audit log write failed:', err);
      setAuditLinkStatus('Audit log not linked — click Close/Escalate/Request info again to retry', 'error');
    }
  } else {
    auditRowsForFallbackDownload.push(row);
    const csv = [AUDIT_HEADERS.join(','), ...auditRowsForFallbackDownload].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'L1_Audit_tracker.csv';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    setAuditLinkStatus('Linked — re-saving L1_Audit_tracker.csv on each decision', 'linked');
  }
}

// Stage a disposition choice -- does NOT commit or write to the audit file. Capture
// whatever the analyst has typed/selected so far so the re-render (which rebuilds the
// panel's innerHTML) doesn't wipe it out before Submit is clicked.
function stage(action){
  const a = ALERTS.find(x=>x.alert_id===selectedId);
  if(!a) return;
  const noteEl = document.getElementById('noteBox');
  const narrEl = document.getElementById('narrativeBox');
  if(noteEl) draftNote = noteEl.value;
  if(narrEl) draftNarrative = narrEl.value;
  stagedAction = action;
  renderMain(true);
}

// Re-opens an already-submitted alert for editing. The prior decision is kept (and shown
// under "Decision history") until the analyst explicitly submits the amendment.
function amendDecision(){
  const a = ALERTS.find(x=>x.alert_id===selectedId);
  const decided = a && decisions[a.alert_id];
  if(!decided) return;
  stagedAction = decided.action;
  draftNote = decided.note || '';
  draftNarrative = decided.narrative || '';
  renderMain(true);
}

function submitDecision(){
  const a = ALERTS.find(x=>x.alert_id===selectedId);
  if(!a || stagedAction===null) return;
  const note = document.getElementById('noteBox').value.trim();
  const narrative = document.getElementById('narrativeBox').value.trim();
  const override = stagedAction !== a.ai_copilot.suggested_action;

  if(stagedAction==='close_false_positive' && !note){
    alert('A rationale is required to close an alert as a false positive. Please select one before submitting.');
    return;
  }
  if(override && !note){
    alert('A rationale is required when your decision overrides the AI/system recommendation. Please select one before submitting.');
    return;
  }
  if(stagedAction==='escalate_to_l2' && !narrative){
    alert('A case narrative is required when escalating to L2 / SAR review. Please describe the basis for escalation before submitting.');
    return;
  }

  const prior = decisions[a.alert_id];
  const history = prior ? [...(prior.history||[]), {action:prior.action, note:prior.note, narrative:prior.narrative, override:prior.override, timestamp:prior.timestamp}] : [];

  decisions[a.alert_id] = {
    action: stagedAction, note, narrative, override,
    amended: !!prior, history,
    timestamp: new Date().toISOString().slice(0,19).replace('T',' '),
  };
  stagedAction = null;
  draftNote = '';
  draftNarrative = '';
  saveDecisionsToStorage();
  renderQueue();
  renderMain();
  persistAuditRow(a, decisions[a.alert_id]);
}

// Force every accordion section open so the printed/PDF case packet includes the full
// investigation record, then restore whichever sections were collapsed beforehand.
let printForcedOpenEls = [];
function printCasePacket(){
  printForcedOpenEls = [];
  document.querySelectorAll('#invAccordion .accordion-collapse').forEach(el=>{
    if(!el.classList.contains('show')){
      el.classList.add('show');
      printForcedOpenEls.push(el);
    }
  });
  window.print();
}
window.addEventListener('afterprint', ()=>{
  printForcedOpenEls.forEach(el=>el.classList.remove('show'));
  printForcedOpenEls = [];
});

loadDecisionsFromStorage();
renderStatStrip();
renderFilterControls();
renderQueue();
renderMain();
</script>
